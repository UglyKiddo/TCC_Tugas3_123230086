runtime: nodejs20
service: t3-086-fe

handlers:
  - url: /static
    static_dir: build/static

  - url: /(.*\.(json|ico|js|css|png|jpg|jpeg|svg|gif|txt))$
    static_files: build/\1
    upload: build/(.*\.(json|ico|js|css|png|jpg|jpeg|svg|gif|txt))$

  - url: /.*
    static_files: build/index.html
    upload: build/index.html