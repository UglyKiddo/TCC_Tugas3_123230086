steps:
  # Build Docker image untuk backend
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/t3-086-be",
        "-f",
        "backend/Dockerfile",
        "backend"
      ]

  # Push image ke Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["push", "gcr.io/$PROJECT_ID/t3-086-be"]

  # Deploy ke Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "t3-086-be",
        "--image",
        "gcr.io/$PROJECT_ID/t3-086-be",
        "--timeout",
        "1000s",
        "--region",
        "us-central1",
        "--allow-unauthenticated"
      ]

options:
  logging: CLOUD_LOGGING_ONLY